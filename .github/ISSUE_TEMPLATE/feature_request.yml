name: Feature request
description: Suggest a new capability or improvement
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea! Please describe the problem you're trying to solve before jumping to a specific solution — that helps us evaluate alternatives.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that's hard or impossible today?
      placeholder: "I want to share an .agentrc.yaml across multiple repos without copying it..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like agentenv to do? A rough sketch is fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fall short.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Use cases, links to similar features in other tools, mockups, etc.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
