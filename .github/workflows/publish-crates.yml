name: Publish to crates.io

on:
  push:
    tags:
      # Restricted to bare CLI tags (e.g. `v0.3.1`) so `vscode-v*` tags
      # don't trigger redundant crates.io publishes. Keep in sync with
      # `release.yml`.
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish agentenv-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p agentenv-core

      - name: Wait for index update
        run: |
          for i in {1..30}; do
            if cargo search agentenv-core --limit 1 | grep -q "^agentenv-core ="; then
              echo "agentenv-core is available on crates.io"
              break
            fi
            echo "Waiting for crates.io index... ($i/30)"
            sleep 10
          done

      - name: Publish agentenv
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p agentenv
