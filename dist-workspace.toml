[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew", "npm"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Homebrew tap to publish the formula into
tap = "eduardoarantes/homebrew-agentenv"
# npm scope (the unscoped name "agentenv" is blocked by similarly-named "agent-env")
npm-scope = "@eduardoarantes"
# Publishers to enable on tagged releases
publish-jobs = ["homebrew", "npm"]
# Build the full matrix on PRs (no publish) so platform breakage is caught pre-tag
pr-run-mode = "upload"
# Allow `.github/workflows/release.yml` to drift from what `dist generate`
# would produce — we narrowed the tag pattern from `**[0-9]+.[0-9]+.[0-9]+*`
# to `v[0-9]+.[0-9]+.[0-9]+*` so `vscode-v*` tags no longer trigger this
# CLI release pipeline. If you re-run `dist init`/`generate`, re-apply the
# narrowed pattern and keep this allow-list entry.
allow-dirty = ["ci"]
