version: 1

# Source-of-truth tool. agentenv reads its native layout losslessly and
# renders the canonical out to every other configured target. v1 supports
# `claude-code` as the source.
source: claude-code

marketplaces:
  default:
    path: ~/.agentenv/marketplace
    remote: https://github.com/eduardoarantes/claude-code-plugin-marketplace.git
    ref: main

# Add plugin entries here, e.g.:
#   - name: git-simple
plugins: []

# Tools to materialize the canonical for. `claude-code` is the source and
# is never written. Empty objects pull in built-in defaults; opt in by
# uncommenting.
targets:
  cursor: {}
  codex: {}
  copilot: {}
  # v2+ slots: only stub coverage today (no hooks writer, and antigravity's
  # agents writer just emits drops). Enabling them adds warning noise to
  # every sync without exercising any real code path; uncomment once real
  # writers land.
  # gemini-cli: {}
  # junie: {}
  # antigravity: {}

sync:
  onOpen: true
  refetch: true


gitignore_managed_links: true