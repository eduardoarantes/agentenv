# agentenv configuration вЂ” every field documented inline.
#
# Source-driven model: pick ONE tool whose native layout is the source of
# truth, then opt in to the OTHER tools you want agentenv to materialize
# the canonical for. The source is always read-only; sync never writes
# back to it.

# Schema version. Only `1` is supported today.
version: 1


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# source
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Source of truth for hooks, skills, and agents. agentenv reads the
# named target's native layout losslessly into
# `.agentenv/<capability>.canonical.yaml` and renders that canonical out
# to every other configured target.
#
# Required when `targets:` is non-empty. The named source is ALWAYS
# read-only вЂ” sync never writes back to it.
#
# Possible values (all known target names):
#   claude-code   в†ђ v1 supported (hooks + skills + agents)
#   cursor        в†ђ v1 supported (hooks + skills + agents)
#   codex         в†ђ v1 supported (hooks via ~/.codex/config.toml,
#                                 skills via .agents/skills/, agents
#                                 via .codex/agents/*.toml)
#   copilot       в†ђ recognised but NOT implemented as a source in v1
#   gemini-cli    в†ђ not a documented source target
#   junie         в†ђ not a documented source target
#   antigravity   в†ђ not a documented source target
#
# Setting `source` to anything outside the v1-supported list above fails
# validation; the other entries are the v2+ slots.
source: claude-code


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Claude `settings.json` import (implicit)
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# When `source: claude-code` is set above, agentenv ALSO reads:
#   - the user's global `~/.claude/settings.json`
#   - the project's `./.claude/settings.json`
# and merges Claude's `extraKnownMarketplaces` / `enabledPlugins` into
# the lists below (project wins on key conflicts; anything you declare
# here wins over both). The `claude-code` target вЂ” if listed in
# `targets:` вЂ” is dropped from sync, because Claude reads its own
# `.claude/` directly.
#
# Missing settings.json files are NOT an error; the import is best-
# effort. Inspect what would be imported with:
#   agentenv claude-config show


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# marketplaces
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Marketplaces are git repos that publish Claude-shaped plugin bundles.
# Each marketplace has a namespace (the key). At least one marketplace
# must be defined, unless `source: claude-code` is set and Claude's
# settings.json provides `extraKnownMarketplaces`.
#
# Per-entry fields:
#   path    (required) вЂ” Local cache path. `~/` is expanded. Relative
#                        paths are resolved against the project root.
#   remote  (required) вЂ” Git URL to fetch from.
#   ref     (optional) вЂ” Git ref (branch or tag). Defaults to `main`.
marketplaces:
  # The bundled community marketplace.
  default:
    path: ~/.agentenv/marketplace
    remote: https://github.com/eduardoarantes/claude-code-plugin-marketplace.git
    ref: main

  # Example of a private team marketplace alongside the default.
  # custom:
  #   path: ~/.agentenv/custom-marketplace
  #   remote: https://github.com/myorg/custom-marketplace.git
  #   ref: main


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# plugins
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Plugins to import from a marketplace. All plugins are parsed as
# Claude-shaped:
#   <plugin>/skills/<name>/SKILL.md
#   <plugin>/agents/<name>.md
#   <plugin>/hooks/hooks.json
#
# Per-entry fields:
#   name       (required) вЂ” Plugin directory name inside the marketplace.
#   namespace  (optional) вЂ” Marketplace namespace key. Defaults to
#                           `default`.
#   version    (optional) вЂ” Plugin version. Defaults to whatever the
#                           marketplace index publishes.
plugins:
  # - name: engineering-standards
  #   namespace: default
  # - name: python-agents
  # - name: pr-review
  #   namespace: custom
  #   version: 1.2.0


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# targets
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Set-membership map of tools to materialize the canonical for.
# Empty per-target objects (`cursor: {}`) opt the target in вЂ” path
# conventions and translation rules live inside each capability's
# writers module, not here.
#
# Per-target object: currently `{}`. The struct is reserved for future
# per-target options (no fields today).
#
# Targets you can list:
#   claude-code   вЂ” source tool. Dropped from sync when `source:
#                   claude-code` is set (Claude reads its own .claude/
#                   directly). Listing it has no useful effect in v1.
#   cursor        вЂ” skills: вњ“   agents: вњ“ (Markdown)        hooks: вњ“
#   codex         вЂ” skills: вњ“ (via .agents/)
#                   agents: вњ“ (TRANSFORMED to TOML вЂ” drops Claude-only
#                              frontmatter keys with warnings)
#                   hooks:  вњ“ (notify block in ~/.codex/config.toml)
#   copilot       вЂ” skills: вњ“   agents: вњ“ (renamed to *.agent.md)
#                   hooks:  вњ— (v1 deferred)
#   gemini-cli    вЂ” skills: вњ“   agents: вњ“ (Markdown)        hooks: вњ—
#   junie         вЂ” skills: вњ“   agents: вњ“ (Markdown)        hooks: вњ—
#   antigravity   вЂ” skills: вњ“ (singular .agent/)
#                   agents: dropped with a warning (Antigravity uses a
#                           single root agents.md, not per-agent files)
#                   hooks:  вњ— (no public hook convention)
#
# Per-tool native destination paths (where agentenv writes):
#   cursor       skills в†’ .cursor/skills/<name>/SKILL.md
#                agents в†’ .cursor/agents/<name>.md
#                hooks  в†’ .cursor/hooks.json
#   codex        skills в†’ .agents/skills/<name>/SKILL.md  (cross-tool alias)
#                agents в†’ .codex/agents/<name>.toml       (materialized)
#                hooks  в†’ ~/.codex/config.toml [managed block]
#   copilot      skills в†’ .github/skills/<name>/SKILL.md
#                agents в†’ .github/agents/<name>.agent.md
#   gemini-cli   skills в†’ .gemini/skills/<name>/SKILL.md
#                agents в†’ .gemini/agents/<name>.md
#   junie        skills в†’ .junie/skills/<name>/SKILL.md
#                agents в†’ .junie/agents/<name>.md
#   antigravity  skills в†’ .agent/skills/<name>/SKILL.md   (singular!)
#
# Refuse-on-conflict: every writer detects user-authored content at its
# destination and either skips with a warning (symlink writers) or fails
# hard (Codex TOML agents, Cursor/Codex hooks).
targets:
  cursor: {}
  # codex: {}
  # copilot: {}
  # gemini-cli: {}
  # junie: {}
  # antigravity: {}


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# sync
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Sync-time behavior.
#
# Fields:
#   onOpen   (optional, bool, default false) вЂ” IDE extensions consult
#            this to decide whether to run `agentenv sync` when a project
#            is opened.
#   refetch  (optional, bool, default false) вЂ” Re-fetch marketplaces on
#            every sync. Overridable per-run with `agentenv sync
#            --refetch` / `--no-fetch`.
sync:
  onOpen: true
  refetch: false


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# clean
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Behavior for `agentenv clean`.
#
# Fields:
#   pruneEmptyDirs  (optional, bool, default true) вЂ” After removing
#                   managed links, prune any directories inside the
#                   project root that are now empty (e.g. a leftover
#                   `.cursor/skills/`). Stops at the project root and
#                   never touches dirs that still hold user files.
clean:
  pruneEmptyDirs: true


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# gitignore_managed_links
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Maintain a sentinel-delimited block in `<project>/.gitignore` listing
# every symlink/copy agentenv currently owns. User-authored .gitignore
# lines outside the block are preserved. `agentenv clean` strips the
# block entirely.
#
# Possible values: true | false (default false)
# gitignore_managed_links: true


# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# instruction_files
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Mirror a single root-level instruction file to the various paths each
# AI tool expects. Each key is a file at the project root; each value
# is a list of project-relative destinations to symlink it from.
#
# NEVER overrides an existing user file вЂ” agentenv skips with a warning
# if the destination already holds content it does not own. agentenv-
# managed symlinks pointing at a different source are updated; pointing
# at the same source are no-ops.
#
# When `source: claude-code` is set and you don't write this block
# yourself, agentenv auto-populates it from each configured target's
# default destinations (CLAUDE.md в†’ AGENTS.md for cursor/codex/copilot,
# etc.).
#
# Per-tool default destinations (used when auto-populating):
#   codex / cursor / copilot   в†’ AGENTS.md
#   gemini-cli                 в†’ GEMINI.md, AGENTS.md
#   junie                      в†’ .junie/AGENTS.md
#   antigravity                в†’ agents.md
#
# instruction_files:
#   CLAUDE.md:
#     - AGENTS.md           # Codex / Cursor / Copilot read this
#     - .junie/AGENTS.md    # JetBrains Junie
#     - agents.md           # Google Antigravity
#   CURSOR.md:
#     - .cursor/rules/main.md
