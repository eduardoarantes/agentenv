version: 1

# Import marketplaces, plugins, and hooks from Claude Code's settings.json.
# When true, agentenv reads `extraKnownMarketplaces` and `enabledPlugins` from
# both the project's `./.claude/settings.json` and the user's global
# `~/.claude/settings.json` (project wins on key conflicts) and merges them
# into the lists below. Anything declared in `marketplaces:` or `plugins:`
# here wins over what Claude provides.
#
# When this is true, the built-in `claude-code` target is dropped from sync
# because Claude Code is treated as the source of truth — re-syncing into
# `.claude/skills`, `.claude/commands`, `.claude/agents` would either be a
# no-op or conflict with files Claude already manages. Use other targets
# (cursor, codex, copilot, gemini-cli, ...) to propagate Claude's plugins
# to other tools.
#
# Inspect what gets imported with: `agentenv claude-config show`
use_claude_config: false

# Marketplaces can be configured with namespaces
# This allows for multiple marketplace sources
marketplaces:
  default:
    path: ~/.agentenv/marketplace
    remote: https://github.com/eduardoarantes/claude-code-plugin-marketplace.git
    ref: main

  # Optional: add custom marketplace
  custom:
    path: ~/.agentenv/custom-marketplace
    remote: https://github.com/myorg/custom-marketplace.git
    ref: main

# Plugins can reference their namespace
# If namespace is omitted, "default" is used
plugins:
  - name: engineering-standards
    namespace: default
  - name: python-agents
    namespace: default
  - name: pr-review
    namespace: custom

# Targets define where each capability is installed for each tool. Empty
# objects pull in the built-in defaults from docs/platform-standards.md;
# override individual fields to customize.
targets:
  # All defaults: skills → .claude/skills/, commands → .claude/commands/,
  # agents → .claude/agents/.
  claude-code: {}

  # Override the skills destination but keep default commands/agents.
  cursor:
    source_mappings:
      skills:
        - target: .cursor/team-skills

  # OpenAI Codex installs skills under the cross-tool .agents/ alias and
  # subagents under .codex/agents/ as TOML.
  codex: {}

  # Custom target: Gemini CLI commands are TOML, not Markdown — make sure
  # plugins shipping commands for this target use .toml leaves.
  gemini-cli: {}

sync:
  onOpen: true
  refetch: false
  mode: symlink

clean:
  # After `agentenv clean` removes managed links, prune any directories inside
  # the project root that are now empty (e.g. a leftover `.claude/skills/`).
  # Stops at the project root and never touches dirs that still hold user files.
  pruneEmptyDirs: true

# Maintain a sentinel-delimited block in <project>/.gitignore listing every
# symlink/copy agentenv currently owns. User-authored .gitignore lines outside
# the block are preserved. `agentenv clean` strips the block.
# gitignore_managed_links: true

# Mirror a single instruction file to the various paths different AI tools
# expect. Each key is a file at the project root; each value is a list of
# project-relative destinations to symlink it from. agentenv NEVER overrides
# an existing user file — it skips with a warning if the destination already
# has content it doesn't own.
#
# instruction_files:
#   CLAUDE.md:
#     - AGENTS.md           # Codex / Cursor / Copilot read this
#     - .junie/AGENTS.md    # JetBrains Junie
#     - agents.md           # Google Antigravity
#   CURSOR.md:
#     - .cursor/rules/main.md
