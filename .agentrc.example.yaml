version: 1

# Marketplaces can be configured with namespaces
# This allows for multiple marketplace sources
marketplaces:
  default:
    path: ~/.agentenv/marketplace
    remote: https://github.com/eduardoarantes/claude-code-plugin-marketplace.git
    ref: main

  # Optional: add custom marketplace
  custom:
    path: ~/.agentenv/custom-marketplace
    remote: https://github.com/myorg/custom-marketplace.git
    ref: main

# Plugins can reference their namespace
# If namespace is omitted, "default" is used
plugins:
  - name: engineering-standards
    namespace: default
  - name: python-agents
    namespace: default
  - name: pr-review
    namespace: custom

# Targets define where each capability is installed for each tool. Empty
# objects pull in the built-in defaults from docs/platform-standards.md;
# override individual fields to customize.
targets:
  # All defaults: skills → .claude/skills/, commands → .claude/commands/,
  # agents → .claude/agents/.
  claude-code: {}

  # Override the skills destination but keep default commands/agents.
  cursor:
    source_mappings:
      skills:
        - target: .cursor/team-skills

  # OpenAI Codex installs skills under the cross-tool .agents/ alias and
  # subagents under .codex/agents/ as TOML.
  codex: {}

  # Custom target: Gemini CLI commands are TOML, not Markdown — make sure
  # plugins shipping commands for this target use .toml leaves.
  gemini-cli: {}

sync:
  onOpen: true
  refetch: false
  mode: symlink
